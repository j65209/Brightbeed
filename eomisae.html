<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>어미새 세일정보 실시간</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='.9em' font-size='60'%3E%F0%9F%90%A6%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #0f1116;
    --card: #171a22;
    --card2: #1e2230;
    --border: #262b3a;
    --text: #e8ebf1;
    --muted: #8892a6;
    --accent: #ff6b6b;
    --accent2: #4ecdc4;
    --hot: #ffb03a;
    --shadow: 0 6px 18px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Segoe UI", "Noto Sans KR", sans-serif; }
  a { color: inherit; text-decoration: none; }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(15, 17, 22, 0.92);
    backdrop-filter: saturate(140%) blur(8px);
    -webkit-backdrop-filter: saturate(140%) blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
  }
  .head-row {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    max-width: 1400px; margin: 0 auto;
  }
  h1 { font-size: 18px; margin: 0; letter-spacing: -0.2px; }
  .meta { font-size: 12px; color: var(--muted); }
  .meta .refreshed { color: var(--accent2); }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 999px; font-size: 12px; cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.05s;
  }
  .chip:hover { background: var(--card2); }
  .chip:active { transform: scale(0.97); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .search {
    flex: 1; min-width: 200px;
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 8px; font-size: 13px;
  }
  .search:focus { outline: 1px solid var(--accent2); border-color: var(--accent2); }
  .refresh-btn {
    background: var(--card2); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer;
  }
  .refresh-btn:hover { background: var(--card); }
  .refresh-btn:disabled { opacity: 0.5; cursor: wait; }

  main { max-width: 1400px; margin: 0 auto; padding: 18px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; display: flex; flex-direction: column;
    transition: transform 0.1s ease, border-color 0.1s ease, box-shadow 0.1s ease;
    box-shadow: var(--shadow);
  }
  .card:hover { transform: translateY(-2px); border-color: #3a4056; box-shadow: 0 10px 22px rgba(0,0,0,0.5); }
  .thumb-wrap {
    position: relative; width: 100%; padding-top: 100%; background: #0b0d13; overflow: hidden;
  }
  .thumb-wrap img {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.25s ease;
  }
  .card:hover .thumb-wrap img { transform: scale(1.03); }
  .thumb-fallback {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 40px;
  }
  .badges {
    position: absolute; top: 8px; left: 8px; display: flex; gap: 4px; flex-wrap: wrap;
  }
  .badge {
    background: rgba(0,0,0,0.7); color: #fff; padding: 3px 8px; border-radius: 999px;
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.2px;
  }
  .badge.b-fs { background: rgba(255,107,107,0.85); }
  .badge.b-os { background: rgba(78,205,196,0.85); }
  .badge.b-rt { background: rgba(160,140,255,0.85); }
  .badge.cate { background: rgba(255,255,255,0.15); backdrop-filter: blur(4px); }
  .badge.hot { background: var(--hot); color: #241800; }
  .body { padding: 12px 12px 10px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .title { font-size: 14px; line-height: 1.35; font-weight: 600; color: var(--text); word-break: break-all;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .row2 { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 11.5px; color: var(--muted); }
  .stats { display: flex; gap: 10px; }
  .stat { display: inline-flex; align-items: center; gap: 3px; }
  .stat .ic { font-size: 11px; opacity: 0.8; }
  .author { max-width: 50%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .empty, .loading, .error {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .error { color: var(--accent); }
  .spinner {
    display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .count-badge {
    background: var(--card2); border: 1px solid var(--border); padding: 4px 10px;
    border-radius: 999px; font-size: 12px; color: var(--muted);
  }
  .count-badge strong { color: var(--text); }

  @media (max-width: 640px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .body { padding: 10px 10px 8px; gap: 6px; }
    .title { font-size: 13px; }
    h1 { font-size: 16px; }
  }
</style>
</head>
<body>
<header>
  <div class="head-row">
    <h1>🐦 어미새 세일정보</h1>
    <span class="meta" id="meta">불러오는 중…</span>
    <span class="count-badge" id="countBadge" style="display:none">총 <strong id="countTotal">0</strong> · 표시 <strong id="countShown">0</strong></span>
    <div class="filters" id="filters"></div>
    <input class="search" id="search" placeholder="키워드 검색 (예: 파타고니아, 무신사)" />
    <button class="refresh-btn" id="refreshBtn" title="캐시 무시하고 서버에서 즉시 재수집">↻ 새로고침</button>
  </div>
</header>
<main>
  <div id="content" class="loading"><span class="spinner"></span>어미새에서 세일정보 수집 중…</div>
</main>

<script>
(() => {
  const TUNNEL_JSON = "https://raw.githubusercontent.com/j65209/Brightbeed/main/tunnel.json";
  // 뷰어 PIN — 이 툴은 read-only 라 뷰어면 충분. Brightbeed 대시보드와 같은 값.
  const PIN = "670200";

  const BOARD_LABELS = { fs: "인기", os: "패션", rt: "기타" };
  const BOARD_ORDER = ["all", "fs", "os", "rt"];

  const state = {
    proxy: null,
    items: [],
    filter: "all",
    search: "",
    fetchedAt: null,
    boards: [],
    lastLoad: 0,
  };

  const $ = (id) => document.getElementById(id);

  async function loadTunnel() {
    const r = await fetch(TUNNEL_JSON, { cache: "no-store" });
    if (!r.ok) throw new Error("tunnel.json fetch failed: " + r.status);
    const j = await r.json();
    return j.url.replace(/\/+$/, "");
  }

  async function loadSales(refresh = false) {
    if (!state.proxy) state.proxy = await loadTunnel();
    const url = state.proxy + "/eomisae/sales" + (refresh ? "?refresh=1" : "");
    const r = await fetch(url, { headers: { "X-Brightbeed-PIN": PIN }, cache: "no-store" });
    if (!r.ok) {
      const text = await r.text().catch(() => "");
      throw new Error("HTTP " + r.status + " " + text.slice(0, 200));
    }
    const cacheAge = r.headers.get("X-Cache-Age");
    const j = await r.json();
    j._cacheAge = cacheAge;
    return j;
  }

  function fmtAge(sec) {
    sec = Number(sec) || 0;
    if (sec < 60) return sec + "초 전";
    if (sec < 3600) return Math.round(sec / 60) + "분 전";
    if (sec < 86400) return Math.round(sec / 3600) + "시간 전";
    return Math.round(sec / 86400) + "일 전";
  }

  function renderFilters() {
    const wrap = $("filters");
    wrap.innerHTML = "";
    const counts = { all: state.items.length };
    for (const b of ["fs", "os", "rt"]) counts[b] = state.items.filter(x => x.board === b).length;
    for (const b of BOARD_ORDER) {
      const chip = document.createElement("button");
      chip.className = "chip" + (state.filter === b ? " active" : "");
      chip.textContent = (b === "all" ? "전체" : BOARD_LABELS[b]) + " (" + (counts[b] || 0) + ")";
      chip.addEventListener("click", () => { state.filter = b; renderFilters(); renderGrid(); });
      wrap.appendChild(chip);
    }
  }

  function filterItems() {
    const q = state.search.trim().toLowerCase();
    return state.items.filter(it => {
      if (state.filter !== "all" && it.board !== state.filter && !(it.sourceBoards || []).includes(state.filter)) return false;
      if (!q) return true;
      const hay = (it.title + " " + (it.category || "") + " " + (it.author || "")).toLowerCase();
      return hay.includes(q);
    });
  }

  function renderGrid() {
    const items = filterItems();
    $("countTotal").textContent = state.items.length;
    $("countShown").textContent = items.length;
    $("countBadge").style.display = "";

    if (!items.length) {
      $("content").className = "empty";
      $("content").innerHTML = state.items.length
        ? "🔍 검색어에 맞는 항목이 없어요."
        : "😴 세일 정보가 아직 없어요.";
      return;
    }

    const grid = document.createElement("div");
    grid.className = "grid";
    for (const it of items) {
      const a = document.createElement("a");
      a.className = "card";
      a.href = it.url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";

      const thumbWrap = document.createElement("div");
      thumbWrap.className = "thumb-wrap";
      if (it.thumb) {
        const img = document.createElement("img");
        img.src = it.thumb;
        img.alt = "";
        img.loading = "lazy";
        img.referrerPolicy = "no-referrer";
        img.onerror = () => {
          img.remove();
          const fb = document.createElement("div");
          fb.className = "thumb-fallback";
          fb.textContent = "🐦";
          thumbWrap.appendChild(fb);
        };
        thumbWrap.appendChild(img);
      } else {
        const fb = document.createElement("div");
        fb.className = "thumb-fallback";
        fb.textContent = "🐦";
        thumbWrap.appendChild(fb);
      }

      const badges = document.createElement("div");
      badges.className = "badges";
      const bBoard = document.createElement("span");
      bBoard.className = "badge b-" + it.board;
      bBoard.textContent = BOARD_LABELS[it.board] || it.board;
      badges.appendChild(bBoard);
      if (it.category) {
        const bCate = document.createElement("span");
        bCate.className = "badge cate";
        bCate.textContent = it.category;
        badges.appendChild(bCate);
      }
      if ((it.likes || 0) >= 30) {
        const bHot = document.createElement("span");
        bHot.className = "badge hot";
        bHot.textContent = "🔥 HOT";
        badges.appendChild(bHot);
      }
      thumbWrap.appendChild(badges);
      a.appendChild(thumbWrap);

      const body = document.createElement("div");
      body.className = "body";
      const title = document.createElement("div");
      title.className = "title";
      title.textContent = it.title;
      body.appendChild(title);

      const row2 = document.createElement("div");
      row2.className = "row2";
      const stats = document.createElement("div");
      stats.className = "stats";
      stats.innerHTML =
        '<span class="stat" title="조회">👁 ' + (it.views || 0).toLocaleString() + '</span>' +
        '<span class="stat" title="댓글">💬 ' + (it.comments || 0) + '</span>' +
        '<span class="stat" title="추천">❤️ ' + (it.likes || 0) + '</span>';
      row2.appendChild(stats);
      const author = document.createElement("span");
      author.className = "author";
      author.textContent = it.author || "";
      row2.appendChild(author);
      body.appendChild(row2);

      a.appendChild(body);
      grid.appendChild(a);
    }
    const c = $("content");
    c.className = "";
    c.innerHTML = "";
    c.appendChild(grid);
  }

  function renderMeta(data) {
    const fetchedAt = data.fetchedAt || "";
    const age = data._cacheAge;
    const parts = [];
    if (fetchedAt) parts.push('수집: <span class="refreshed">' + fetchedAt + '</span>');
    if (age !== null && age !== undefined && age !== "unknown") parts.push(fmtAge(age));
    if (data._error) parts.push('<span style="color:var(--accent)">⚠ 최근 수집 실패</span>');
    $("meta").innerHTML = parts.join(" · ");
  }

  async function refresh(force = false) {
    const btn = $("refreshBtn");
    btn.disabled = true;
    try {
      const data = await loadSales(force);
      state.items = data.items || [];
      state.fetchedAt = data.fetchedAt;
      state.boards = data.boards || [];
      renderMeta(data);
      renderFilters();
      renderGrid();
      state.lastLoad = Date.now();
    } catch (e) {
      $("content").className = "error";
      $("content").textContent = "⚠ 로드 실패: " + e.message;
      $("meta").textContent = "";
    } finally {
      btn.disabled = false;
    }
  }

  $("search").addEventListener("input", (e) => {
    state.search = e.target.value;
    if (state.items.length) renderGrid();
  });
  $("refreshBtn").addEventListener("click", () => refresh(true));

  // 페이지가 다시 활성화되면 5분 지났을 때만 조용히 재로드
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && Date.now() - state.lastLoad > 5 * 60 * 1000) {
      refresh(false);
    }
  });

  refresh(false);
})();
</script>
</body>
</html>
