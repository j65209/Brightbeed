<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>샤인비드 발주서 리스트</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='.9em' font-size='60'%3E%F0%9F%93%A6%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #fefcf5;
    --panel: #ffffff;
    --panel-2: #f8f4e9;
    --line: #e8e2d2;
    --line-2: #d3cbb6;
    --text: #0a0b0d;
    --text-2: #3a3e46;
    --muted: #6b7280;
    --accent: #ff2e93;
    --accent-2: #ff6b35;
    --ok: #15803d;
    --warn: #b45309;
    --danger: #b91c1c;
    --shadow: 0 2px 8px rgba(20,20,30,.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: 'Pretendard','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
    font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  header {
    position: sticky; top: 0; z-index: 20;
    background: rgba(254,252,245,.94);
    backdrop-filter: saturate(140%) blur(8px);
    -webkit-backdrop-filter: saturate(140%) blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 14px 20px 12px;
  }
  .head-row {
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
    max-width: 1400px; margin: 0 auto;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .brand-sub { font-size: 12px; color: var(--muted); }
  .meta { margin-left: auto; font-size: 12px; color: var(--muted); }
  .meta b { color: var(--text); font-weight: 600; }

  .controls {
    max-width: 1400px; margin: 10px auto 0;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .search {
    flex: 1; min-width: 220px;
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    padding: 8px 12px; border-radius: 8px; font-size: 13px;
  }
  .search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,46,147,.15); }
  .chip {
    background: var(--panel); border: 1px solid var(--line); color: var(--text-2);
    padding: 6px 11px; border-radius: 999px; font-size: 12px; cursor: pointer; user-select: none;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .chip:hover { background: var(--panel-2); }
  .chip.active { background: var(--text); border-color: var(--text); color: #fff; font-weight: 600; }
  .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .sep { width: 1px; height: 20px; background: var(--line-2); margin: 0 4px; }

  main { max-width: 1400px; margin: 0 auto; padding: 16px 20px 60px; }

  .empty {
    padding: 60px 20px; text-align: center; color: var(--muted);
    background: var(--panel); border: 1px dashed var(--line); border-radius: 12px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color 0.1s ease, box-shadow 0.1s ease, transform 0.05s;
    cursor: pointer;
  }
  .card:hover { border-color: var(--line-2); box-shadow: 0 4px 14px rgba(20,20,30,.08); }
  .card:active { transform: translateY(1px); }
  .card.open { border-color: var(--accent); box-shadow: 0 4px 18px rgba(255,46,147,.1); }

  .row-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .date { font-weight: 700; letter-spacing: -0.2px; font-size: 14px; }
  .date .yr { color: var(--muted); font-weight: 500; margin-right: 3px; }
  .tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag {
    font-size: 10.5px; font-weight: 600; padding: 2px 7px; border-radius: 999px;
    background: var(--panel-2); color: var(--text-2); border: 1px solid var(--line);
    letter-spacing: 0.1px;
  }
  .tag.group   { background: rgba(255,46,147,.08); color: var(--accent); border-color: rgba(255,46,147,.25); }
  .tag.note    { background: rgba(2,132,199,.08); color: #0284c7; border-color: rgba(2,132,199,.25); }
  .tag.extra   { background: rgba(255,107,53,.1); color: var(--accent-2); border-color: rgba(255,107,53,.3); }

  .filename {
    font-size: 12px; color: var(--text-2); word-break: break-all;
    line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 2px; }
  .stat { display: flex; flex-direction: column; gap: 1px; }
  .stat .lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.2px; }
  .stat .val { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .stat .val.cny::after { content: ''; font-weight: 500; color: var(--muted); font-size: 10.5px; }
  .stat .val.qty::after { content: ' 개'; font-weight: 500; color: var(--muted); font-size: 10.5px; }
  .stat .val.cnt::after { content: ' 품목'; font-weight: 500; color: var(--muted); font-size: 10.5px; }

  .details {
    margin-top: 6px; padding-top: 10px; border-top: 1px dashed var(--line);
    display: none;
  }
  .card.open .details { display: block; }
  .details table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .details th, .details td { padding: 5px 6px; text-align: left; border-bottom: 1px solid var(--line); vertical-align: top; }
  .details th { background: var(--panel-2); color: var(--muted); font-weight: 600; font-size: 10.5px; letter-spacing: 0.2px; }
  .details td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .details td.memo { color: var(--muted); font-size: 11px; }
  .details a { color: #0284c7; }
  .details a:hover { text-decoration: underline; }
  .actions { display: flex; gap: 6px; margin-top: 8px; }
  .btn {
    font-size: 11px; padding: 5px 9px; border-radius: 6px; border: 1px solid var(--line);
    background: var(--panel); color: var(--text-2); cursor: pointer;
  }
  .btn:hover { background: var(--panel-2); border-color: var(--line-2); }

  .summary-bar {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 16px; margin-bottom: 14px;
    display: flex; gap: 20px; flex-wrap: wrap; box-shadow: var(--shadow);
  }
  .summary-bar .s-item { display: flex; flex-direction: column; gap: 2px; }
  .summary-bar .s-lbl { font-size: 11px; color: var(--muted); }
  .summary-bar .s-val { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }

  @media (max-width: 600px) {
    header { padding: 12px 14px; }
    main { padding: 12px 14px 40px; }
    .grid { grid-template-columns: 1fr; }
    .brand-title { font-size: 15px; }
    .meta { width: 100%; margin-left: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="head-row">
    <div class="brand">
      <span class="brand-title">📦 발주서 아카이브</span>
      <span class="brand-sub">Dropbox/중요 폴더/발주서</span>
    </div>
    <div class="meta" id="meta">불러오는 중…</div>
  </div>
  <div class="controls">
    <input class="search" id="q" type="search" placeholder="파일명·품목·메모·노트 검색…" />
    <div class="sep"></div>
    <div class="chip-group" id="yearFilters"></div>
    <div class="sep"></div>
    <div class="chip-group" id="groupFilters"></div>
  </div>
</header>

<main>
  <div class="summary-bar" id="summary" style="display:none"></div>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty">데이터 로드 중…</div>
</main>

<script>
const state = {
  all: [],
  filtered: [],
  q: "",
  group: "",
  year: "",
  opened: new Set(),
};

function fmtInt(n) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return Math.round(n).toLocaleString("ko-KR");
}
function fmtDate(iso) {
  if (!iso) return "날짜 없음";
  const [y, m, d] = iso.split("-");
  return `<span class="yr">${y.slice(2)}.</span>${m}.${d}`;
}
function esc(s) {
  return (s ?? "").toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function load() {
  try {
    const r = await fetch("data/orders.json?cb=" + Date.now(), { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    state.all = data.orders || [];
    document.getElementById("meta").innerHTML =
      `총 <b>${data.count}</b>건 · 갱신 ${data.generated_at?.slice(0,16).replace('T',' ') || '—'}`;
    buildFilters();
    apply();
  } catch (e) {
    document.getElementById("empty").innerText = "데이터 로드 실패: " + e.message +
      "\n먼저 서버에서 python3 scripts/parse_orders.py 를 실행하세요.";
    document.getElementById("meta").textContent = "데이터 없음";
  }
}

function buildFilters() {
  const groups = new Map(), years = new Map();
  for (const o of state.all) {
    const g = o.group || "기타";
    groups.set(g, (groups.get(g) || 0) + 1);
    const yr = (o.date || "").slice(0, 4);
    if (yr) years.set(yr, (years.get(yr) || 0) + 1);
  }
  renderChips("yearFilters", years, "year", true);
  renderChips("groupFilters", groups, "group");
}

function renderChips(id, map, key, desc = false) {
  const el = document.getElementById(id);
  const entries = [...map.entries()].sort((a, b) => desc ? b[0].localeCompare(a[0]) : b[1] - a[1]);
  const all = `<button class="chip ${!state[key] ? 'active' : ''}" data-k="${key}" data-v="">전체</button>`;
  el.innerHTML = all + entries.map(([k, n]) =>
    `<button class="chip ${state[key] === k ? 'active' : ''}" data-k="${key}" data-v="${esc(k)}">${esc(k)} <span style="color:var(--muted);font-weight:500">${n}</span></button>`
  ).join("");
  el.querySelectorAll(".chip").forEach(c => c.addEventListener("click", () => {
    state[c.dataset.k] = c.dataset.v;
    buildFilters();
    apply();
  }));
}

function apply() {
  const q = state.q.trim().toLowerCase();
  state.filtered = state.all.filter(o => {
    if (state.group && (o.group || "기타") !== state.group) return false;
    if (state.year && !(o.date || "").startsWith(state.year)) return false;
    if (q) {
      const hay = [o.file, o.note || "", o.group || "",
        ...(o.items || []).slice(0, 40).map(it => `${it.kor} ${it.cn} ${it.memo}`)
      ].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  render();
  renderSummary();
}

function renderSummary() {
  const s = state.filtered;
  if (!s.length) { document.getElementById("summary").style.display = "none"; return; }
  const totalQty = s.reduce((a, o) => a + (o.total_qty || 0), 0);
  const totalCny = s.reduce((a, o) => a + (o.total_cny || 0), 0);
  const totalItems = s.reduce((a, o) => a + (o.item_count || 0), 0);
  document.getElementById("summary").style.display = "flex";
  document.getElementById("summary").innerHTML = `
    <div class="s-item"><span class="s-lbl">발주 건수</span><span class="s-val">${fmtInt(s.length)}</span></div>
    <div class="s-item"><span class="s-lbl">총 품목수</span><span class="s-val">${fmtInt(totalItems)}</span></div>
    <div class="s-item"><span class="s-lbl">총 수량</span><span class="s-val">${fmtInt(totalQty)}</span></div>
    <div class="s-item"><span class="s-lbl">총 상품가</span><span class="s-val">¥${fmtInt(totalCny)}</span></div>
  `;
}

function render() {
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  if (!state.filtered.length) {
    grid.innerHTML = "";
    empty.style.display = "block";
    empty.innerText = state.all.length ? "필터 조건에 맞는 발주서가 없어요." : "발주서 없음";
    return;
  }
  empty.style.display = "none";
  grid.innerHTML = state.filtered.map((o, i) => renderCard(o, i)).join("");
  grid.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.closest(".btn")) return;
      const key = card.dataset.key;
      if (state.opened.has(key)) state.opened.delete(key);
      else state.opened.add(key);
      card.classList.toggle("open");
    });
  });
}

function renderCard(o, idx) {
  const key = o.file;
  const opened = state.opened.has(key);
  const tags = [];
  if (o.group && o.group !== "일반") tags.push(`<span class="tag group">${esc(o.group)}</span>`);
  if (o.note) tags.push(`<span class="tag note">${esc(o.note)}</span>`);
  if (o.extra) tags.push(`<span class="tag extra">추가</span>`);

  const items = o.items || [];
  const isUrl = s => typeof s === "string" && /^https?:\/\//.test(s);
  const pickName = it => {
    const cn = it.cn && !isUrl(it.cn) ? it.cn : "";
    const kor = it.kor && !isUrl(it.kor) ? it.kor : "";
    return cn || kor || "";
  };
  const pickLink = it => {
    if (it.link && isUrl(it.link)) return it.link;
    if (isUrl(it.kor)) return it.kor;
    if (isUrl(it.cn)) return it.cn;
    return "";
  };
  const rows = items.slice(0, 100).map(it => {
    const name = pickName(it);
    const link = pickLink(it);
    return `
    <tr>
      <td>${esc(it.no || "")}</td>
      <td>${esc(name)}${it.memo ? `<div class="memo">${esc(it.memo)}</div>` : ""}</td>
      <td class="num">${fmtInt(it.qty)}</td>
      <td class="num">${it.price_cny != null ? "¥" + it.price_cny.toFixed(2) : "—"}</td>
      <td>${link ? `<a href="${esc(link)}" target="_blank" rel="noopener">🔗</a>` : ""}</td>
    </tr>`;
  }).join("");
  const detailsHtml = items.length ? `
    <div class="details">
      <table>
        <thead><tr><th>#</th><th>품목</th><th class="num">수량</th><th class="num">단가</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${items.length > 100 ? `<div style="font-size:11px;color:var(--muted);margin-top:6px">…외 ${items.length - 100}개 (원본 파일 참조)</div>` : ""}
      <div class="actions">
        <button class="btn" onclick="event.stopPropagation();copyFile('${esc(o.file)}')">📋 파일명 복사</button>
      </div>
    </div>` : "";

  return `
    <div class="card ${opened ? 'open' : ''}" data-key="${esc(key)}">
      <div class="row-top">
        <div class="date">${fmtDate(o.date)}</div>
        <div class="tags">${tags.join("")}</div>
      </div>
      <div class="filename">${esc(o.file)}</div>
      <div class="stats">
        <div class="stat"><span class="lbl">품목수</span><span class="val cnt">${fmtInt(o.item_count)}</span></div>
        <div class="stat"><span class="lbl">총수량</span><span class="val qty">${fmtInt(o.total_qty)}</span></div>
        <div class="stat"><span class="lbl">상품가</span><span class="val cny">${o.total_cny != null ? '¥' + fmtInt(o.total_cny) : '—'}</span></div>
      </div>
      ${detailsHtml}
    </div>
  `;
}

function copyFile(name) {
  navigator.clipboard.writeText(name).then(() => {
    // no-op toast for now
  });
}

document.getElementById("q").addEventListener("input", (e) => {
  state.q = e.target.value;
  apply();
});

load();
</script>
</body>
</html>
